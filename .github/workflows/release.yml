name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.ZANTARIX_APP_ID }}
          private-key: ${{ secrets.ZANTARIX_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup cursus
        uses: ./setup-cursus
        with:
          version-file: package.json
        env:
          GH_TOKEN: ${{ github.token }}

      # Use the GitHub App bot as the git committer so release commits and tags
      # are attributed to the App rather than to a personal account.
      # Values are passed via env to avoid shell-injection from expression interpolation.
      - name: Configure git identity
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_USER_ID: ${{ vars.ZANTARIX_APP_USER_ID }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Run cursus ci
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: cursus ci --no-interactive
